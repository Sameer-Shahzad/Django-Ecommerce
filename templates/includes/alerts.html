{% if messages %}
    {% for message in messages %}
    <div id="message" class="container mx-auto mt-4 px-4">
        <div {% if message.tags %} class="p-4 rounded-2xl mb-4 text-sm font-bold shadow-sm border {% if message.tags == 'success' %} bg-green-50 text-green-700 border-green-100 {% else %} bg-red-50 text-red-700 border-red-100 {% endif %}" {% endif %} role="alert">
            {{ message }}
        </div>
    </div>
    {% endfor %}
{% endif %}
