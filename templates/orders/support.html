{% extends 'base.html' %}
{% block content %}
<div class="bg-slate-50 min-h-screen py-16 px-4">
    <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-3xl font-black uppercase tracking-tight">Customer Support</h1>
            <p class="opacity-80 mt-2">We are here to help you 24/7</p>
        </div>
        <div class="p-10 space-y-8">
            <div class="flex items-start space-x-4">
                <div class="bg-blue-100 p-3 rounded-lg text-blue-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Email Us</h3>
                    <p class="text-slate-600">support@auraattire.com</p>
                </div>
            </div>
            <div class="flex items-start space-x-4">
                <div class="bg-blue-100 p-3 rounded-lg text-blue-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">Office Address</h3>
                    <p class="text-slate-600">ITU, Arfa Software Technology Park, Lahore, Pakistan</p>
                </div>
            </div>
            <div class="pt-6 border-t border-slate-100 text-center">
                <a href="{% url 'store' %}" class="text-blue-600 font-bold hover:underline">← Back to Shopping</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
