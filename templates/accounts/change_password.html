{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-20 bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 flex justify-center">
        
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-100">
                    <i class="fas fa-lock text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-900 tracking-tight">Update Password</h2>
                <p class="text-gray-500 mt-2">Ensure your account stays secure</p>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 md:p-10">
                
                {% include 'includes/alerts.html' %}

                <form action="{% url 'change_password' %}" method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Current Password</label>
                        <div class="relative">
                            <input type="password" name="current_password" placeholder="••••••••" 
                                class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-100 transition-all outline-none" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">New Password</label>
                        <div class="relative">
                            <input type="password" name="new_password" placeholder="Create new password" 
                                class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-100 transition-all outline-none" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm New Password</label>
                        <div class="relative">
                            <input type="password" name="confirm_password" placeholder="Repeat new password" 
                                class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-100 transition-all outline-none" required>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold  transition-all shadow-xl shadow-gray-200 flex items-center justify-center gap-2">
                            Update Password <i class="fas fa-check-circle text-xs"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                    <a href="{% url 'dashboard' %}" class="text-sm font-bold text-gray-400 hover:text-gray-900 transition flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left text-[10px]"></i> Back to Dashboard
                    </a>
                </div>
            </div>
            <div class="text-center mt-8">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Secure Encryption Protected</p>
            </div>
        </div>

    </div>
</section>
{% endblock %}
